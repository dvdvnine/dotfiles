general {
  layout = dwindle
  resize_on_border = true

  gaps_in = 5
  gaps_out = 20
  border_size = 4

  col.active_border = $activeBorderColor
  col.inactive_border = $inactiveBorderColor
}


dwindle {
  pseudotile = true
  preserve_split = true

  # single_window_aspect_ratio = 16 9
  default_split_ratio = 1.5

  force_split = 2
}
